<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EDUSPHERE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .profile-page { padding: calc(70px + var(--spacing-xl)) 0 var(--spacing-xl); }
        .profile-header { background: linear-gradient(135deg, var(--primary-color), var(--primary-dark)); padding: var(--spacing-2xl); color: var(--text-light); border-radius: var(--radius-lg); margin-bottom: var(--spacing-xl); }
        .profile-info { display: flex; align-items: center; gap: var(--spacing-xl); flex-wrap: wrap; }
        .profile-avatar { width: 120px; height: 120px; border-radius: var(--radius-full); background: var(--bg-primary); display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; color: var(--primary-color); border: 4px solid var(--text-light); }
        .profile-details h1 { color: var(--text-light); font-size: 2rem; margin-bottom: var(--spacing-xs); }
        .profile-details p { color: rgba(255,255,255,0.8); margin: 0; }
        .profile-stats { display: flex; gap: var(--spacing-xl); margin-top: var(--spacing-lg); flex-wrap: wrap; }
        .profile-stat { text-align: center; }
        .profile-stat-value { font-size: 1.5rem; font-weight: 700; color: var(--text-light); }
        .profile-stat-label { font-size: 0.875rem; color: rgba(255,255,255,0.7); }
        .profile-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--spacing-xl); }
        @media (max-width: 992px) { .profile-grid { grid-template-columns: 1fr; } }
        .profile-section { background: var(--bg-primary); border-radius: var(--radius-lg); padding: var(--spacing-xl); margin-bottom: var(--spacing-xl); box-shadow: var(--shadow-sm); }
        .profile-section h3 { font-size: 1.125rem; margin-bottom: var(--spacing-lg); }
        .stat-row { display: flex; justify-content: space-between; padding: var(--spacing-md) 0; border-bottom: 1px solid var(--border-light); }
        .stat-row:last-child { border-bottom: none; }
        .achievement-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: var(--spacing-md); }
        .achievement-card { text-align: center; padding: var(--spacing-lg); background: var(--bg-secondary); border-radius: var(--radius-md); }
        .achievement-card.locked { opacity: 0.5; filter: grayscale(1); }
        .achievement-icon { font-size: 2rem; margin-bottom: var(--spacing-sm); }
        .achievement-name { font-size: 0.75rem; font-weight: 600; }
        .course-progress-item { display: flex; gap: var(--spacing-md); padding: var(--spacing-md) 0; border-bottom: 1px solid var(--border-light); }
        .course-progress-item:last-child { border-bottom: none; }
        .course-thumb { width: 80px; height: 60px; background: var(--bg-tertiary); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; }
        .course-info { flex: 1; }
        .course-info h4 { font-size: 0.9375rem; margin-bottom: var(--spacing-xs); }
        .course-info p { font-size: 0.8125rem; color: var(--text-tertiary); margin: 0; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand"><span style="font-size: 2rem;">🎓</span>EDUSPHERE</a>
            <div class="navbar-menu" id="navbar-menu">
                <ul class="navbar-links">
                    <li><a href="index.html" class="navbar-link">Home</a></li>
                    <li><a href="courses.html" class="navbar-link">Courses</a></li>
                    <li><a href="dashboard.html" class="navbar-link">Dashboard</a></li>
                    <li><a href="profile.html" class="navbar-link active">Profile</a></li>
                </ul>
                <div class="navbar-actions">
                    <span class="user-xp" style="font-weight:600;color:var(--primary-color);">0 XP</span>
                    <a href="login.html" class="btn btn-primary" onclick="AuthManager.logout()">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container profile-page">
        <div class="profile-header">
            <div class="profile-info">
                <div class="profile-avatar" id="profile-avatar">U</div>
                <div class="profile-details">
                    <h1 id="profile-name">User Name</h1>
                    <p id="profile-email">user@email.com</p>
                    <div class="profile-stats">
                        <div class="profile-stat">
                            <div class="profile-stat-value" id="stat-courses">0</div>
                            <div class="profile-stat-label">Courses</div>
                        </div>
                        <div class="profile-stat">
                            <div class="profile-stat-value" id="stat-xp">0</div>
                            <div class="profile-stat-label">XP Earned</div>
                        </div>
                        <div class="profile-stat">
                            <div class="profile-stat-value" id="stat-streak">0</div>
                            <div class="profile-stat-label">Day Streak</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-grid">
            <div>
                <div class="profile-section">
                    <h3>My Courses</h3>
                    <div id="enrolled-courses">
                        <p style="color:var(--text-tertiary);">No courses enrolled yet. <a href="courses.html">Browse courses</a></p>
                    </div>
                </div>
                <div class="profile-section">
                    <h3>Achievements</h3>
                    <div class="achievement-grid" id="achievements"></div>
                </div>
            </div>
            <div>
                <div class="profile-section">
                    <h3>Account Stats</h3>
                    <div class="stat-row"><span>Member Since</span><span id="join-date">-</span></div>
                    <div class="stat-row"><span>Quizzes Completed</span><span id="quiz-count">0</span></div>
                    <div class="stat-row"><span>Certificates Earned</span><span id="cert-count">0</span></div>
                </div>
                <div class="profile-section">
                    <h3>Settings</h3>
                    <button class="btn btn-outline w-full mb-sm" onclick="ThemeManager.toggle()">Toggle Dark Mode</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        AuthManager.checkAuth();
        if (!APP_STATE.isLoggedIn) { window.location.href = 'login.html'; }
        
        const user = APP_STATE.currentUser;
        if (user) {
            document.getElementById('profile-name').textContent = user.name;
            document.getElementById('profile-email').textContent = user.email;
            document.getElementById('profile-avatar').textContent = user.name.charAt(0).toUpperCase();
            document.getElementById('stat-xp').textContent = (user.xp || 0).toLocaleString();
            document.getElementById('stat-streak').textContent = user.streak || 0;
            document.getElementById('stat-courses').textContent = (user.enrolledCourses || []).length;
            document.getElementById('join-date').textContent = new Date(user.joinedAt || Date.now()).toLocaleDateString();
            document.querySelector('.user-xp').textContent = `${(user.xp || 0).toLocaleString()} XP`;
            
            // Render achievements
            const achievementsEl = document.getElementById('achievements');
            achievementsEl.innerHTML = ACHIEVEMENTS.map(a => {
                const unlocked = user.achievements?.includes(a.id);
                return `<div class="achievement-card ${unlocked ? '' : 'locked'}"><div class="achievement-icon">${a.icon}</div><div class="achievement-name">${a.name}</div></div>`;
            }).join('');
        }
    </script>
</body>
</html>
